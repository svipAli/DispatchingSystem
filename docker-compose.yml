services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./celery_worker:/app/celery_worker
      - upload_data:/app/app/static/upload

  celery_worker:
    build: .
    command: celery -A celery_worker.celery_app worker -l info -c 4
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./celery_worker:/app/celery_worker

  celery_beat:
    build: .
    command: celery -A celery_worker.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./celery_worker:/app/celery_worker

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dispatching
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
  upload_data:
