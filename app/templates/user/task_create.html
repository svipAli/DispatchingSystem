{% extends "base.html" %}
{% block title %}提交任务 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">提交任务</h1>
<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow-sm p-6 border">
        <form onsubmit="submitTask(); return false;">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">服务类型</label>
                <select id="service_type" required class="w-full px-3 py-2 border rounded-lg" onchange="onServiceChange()">
                    <option value="">请选择服务</option>
                </select>
            </div>
            <div id="params-form" class="space-y-4 mb-4"></div>
            <button type="submit" id="btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 hidden">
                提交任务
            </button>
        </form>
        <div id="result" class="mt-4"></div>
    </div>
</div>
<script>
var servicesData = {};
var currentParams = [];

App.get('/api/v1/mcp-services?is_verified=true&status=true').then(function(data) {
    var sel = document.getElementById('service_type');
    if (data.data && data.data.items) {
        data.data.items.forEach(function(s) {
            servicesData[s.service_type] = s;
            var opt = document.createElement('option');
            opt.value = s.service_type;
            opt.textContent = s.service_name + ' (¥' + s.price_per_call + '/次)';
            sel.appendChild(opt);
        });
    }
    var svc = new URLSearchParams(window.location.search).get('service');
    if (svc) { sel.value = svc; onServiceChange(); }
});

function onServiceChange() {
    var st = document.getElementById('service_type').value;
    var s = servicesData[st];
    var el = document.getElementById('params-form');
    var btn = document.getElementById('btn');
    currentParams = (s && s.params) ? s.params : [];

    if (!currentParams.length) {
        el.innerHTML = currentParams.length === 0 && s ? '<div class="text-xs text-gray-400">该服务无需参数</div>' : '';
        btn.classList.toggle('hidden', !s);
    } else {
        var html = '';
        currentParams.forEach(function(p) {
            var inputHtml = '';
            var req = p.required ? ' *' : '';
            if (p.type === 'bool' || p.type === 'boolean') {
                inputHtml = '<select id="pf_' + p.field + '" class="w-full px-3 py-2 border rounded-lg"><option value="true">是</option><option value="false" selected>否</option></select>';
            } else if (p.type === 'int' || p.type === 'float') {
                inputHtml = '<input type="number" id="pf_' + p.field + '" step="' + (p.type==='float'?'any':'1') + '" class="w-full px-3 py-2 border rounded-lg" placeholder="' + (p.description || '') + '">';
            } else if (p.type === 'list' || p.type === 'array' || p.type === 'dict') {
                inputHtml = '<textarea id="pf_' + p.field + '" rows="4" class="w-full px-3 py-2 border rounded-lg font-mono text-sm" placeholder=\'' + (p.type==='list'?'["a","b"]':'{"key":"value"}') + '\'></textarea>';
            } else {
                inputHtml = '<input type="text" id="pf_' + p.field + '" class="w-full px-3 py-2 border rounded-lg" placeholder="' + (p.description || '') + '">';
            }
            html += '<div><label class="block text-sm font-medium text-gray-700 mb-1">' + (p.label || p.field) + req + '</label>' +
                inputHtml +
                (p.description ? '<p class="text-xs text-gray-400 mt-1">' + p.description + '</p>' : '') +
                '</div>';
        });
        el.innerHTML = html;
        btn.classList.remove('hidden');
    }
}

function submitTask() {
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '提交中...';
    var input = {};
    currentParams.forEach(function(p) {
        var el = document.getElementById('pf_' + p.field);
        if (!el) return;
        var val = el.value.trim();
        if (!val && p.required) return;
        if (!val) return;
        if (p.type === 'int') val = parseInt(val);
        else if (p.type === 'float') val = parseFloat(val);
        else if (p.type === 'bool' || p.type === 'boolean') val = val === 'true';
        else if (p.type === 'list' || p.type === 'array' || p.type === 'dict') {
            try { val = JSON.parse(val); } catch(e) { return; }
        }
        input[p.field] = val;
    });
    App.post('/api/v1/tasks', {
        service_type: document.getElementById('service_type').value,
        request_params: {input: input}
    }).then(function(data) {
        var el = document.getElementById('result');
        if (data.code === 0) {
            el.innerHTML = '<div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3">任务已提交！<a href="/tasks" class="underline ml-2">查看任务</a></div>';
        } else {
            el.innerHTML = '<div class="text-red-500 text-sm">' + data.message + '</div>';
        }
        btn.disabled = false; btn.textContent = '提交任务';
    });
}
</script>
{% endblock %}
