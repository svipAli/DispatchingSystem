{% extends "base.html" %}
{% block title %}注册 - {{ settings.APP_NAME }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-xl shadow-sm p-8">
        <h1 class="text-2xl font-bold text-center mb-6">注册新账号</h1>

        <div id="error-box" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4 hidden"></div>

        <form onsubmit="doRegister(); return false;">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="username" required minlength="3"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="至少 3 个字符">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" id="email" required
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="your@email.com">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="至少 6 位密码">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" id="password_confirm" required minlength="6"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请再次输入密码">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">验证码</label>
                <div class="flex gap-2">
                    <input type="text" id="captcha_code" maxlength="4" required
                        class="flex-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 uppercase" placeholder="请输入验证码">
                    <img id="captcha-img" src="" class="h-10 w-28 border rounded cursor-pointer" title="点击刷新" onclick="refreshCaptcha()">
                </div>
                <input type="hidden" id="captcha_id">
            </div>
            <button type="submit" id="btn" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                注册
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            已有账号？<a href="/login" class="text-indigo-600 hover:underline">立即登录</a>
        </p>
    </div>
</div>

<script>
function doRegister() {
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '注册中...';
    var body = new URLSearchParams();
    body.append('username', document.getElementById('username').value);
    body.append('email', document.getElementById('email').value);
    body.append('password', document.getElementById('password').value);
    body.append('password_confirm', document.getElementById('password_confirm').value);
    body.append('captcha_id', document.getElementById('captcha_id').value);
    body.append('captcha_code', document.getElementById('captcha_code').value);

    fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.code === 0) {
                App.setToken(data.data.token);
                App.navigate('/dashboard');
            } else {
                var err = document.getElementById('error-box');
                err.textContent = data.message;
                err.classList.remove('hidden');
                btn.disabled = false; btn.textContent = '注册';
            }
        })
        .catch(function() { btn.disabled = false; btn.textContent = '注册'; refreshCaptcha(); });
}
function refreshCaptcha() {
    fetch('/api/v1/captcha').then(function(r) { return r.json(); }).then(function(d) {
        document.getElementById('captcha_id').value = d.data.captcha_id;
        document.getElementById('captcha-img').src = d.data.image;
    });
}
refreshCaptcha();
</script>
{% endblock %}
