{% extends "base.html" %}
{% block title %}忘记密码 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm p-8">
        <h1 class="text-2xl font-bold text-center mb-6">忘记密码</h1>
        <div id="msg-box" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-4"></div>
        <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4"></div>

        <form onsubmit="doForgot(); return false;">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">注册邮箱</label>
                <input type="email" id="email" required
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="your@email.com">
            </div>
            <button type="submit" id="btn" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                发送重置链接
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="/login" class="text-indigo-600 hover:underline">返回登录</a>
        </p>
    </div>
</div>
<script>
function doForgot() {
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '发送中...';
    var body = new URLSearchParams();
    body.append('email', document.getElementById('email').value);
    fetch('/api/v1/users/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('msg-box').textContent = data.message;
            document.getElementById('msg-box').classList.remove('hidden');
            document.getElementById('error-box').classList.add('hidden');
            btn.disabled = false; btn.textContent = '发送重置链接';
        })
        .catch(function() {
            btn.disabled = false; btn.textContent = '发送重置链接';
        });
}
</script>
{% endblock %}
