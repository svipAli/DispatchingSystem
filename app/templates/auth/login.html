{% extends "base.html" %}
{% block title %}登录 - {{ settings.APP_NAME }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm p-8">
        <h1 class="text-2xl font-bold text-center mb-6">登录</h1>

        <div id="error-box" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4 hidden"></div>

        <form onsubmit="doLogin(); return false;">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="username" required
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入用户名">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" required
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="请输入密码">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">验证码</label>
                <div class="flex gap-2">
                    <input type="text" id="captcha_code" maxlength="4" required
                        class="flex-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 uppercase" placeholder="请输入验证码">
                    <img id="captcha-img" src="" class="h-10 w-28 border rounded cursor-pointer" title="点击刷新" onclick="refreshCaptcha()">
                </div>
                <input type="hidden" id="captcha_id">
            </div>
            <button type="submit" id="btn" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                登录
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            还没有账号？<a href="/register" class="text-indigo-600 hover:underline">立即注册</a>
        </p>
    </div>
</div>

<script>
function doLogin() {
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '登录中...';
    var body = new URLSearchParams();
    body.append('username', document.getElementById('username').value);
    body.append('password', document.getElementById('password').value);
    body.append('captcha_id', document.getElementById('captcha_id').value);
    body.append('captcha_code', document.getElementById('captcha_code').value);

    fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.code === 0) {
                App.setToken(data.data.token);
                App.navigate('/dashboard');
            } else {
                var err = document.getElementById('error-box');
                err.textContent = data.message;
                err.classList.remove('hidden');
                refreshCaptcha();
                btn.disabled = false; btn.textContent = '登录';
            }
        })
        .catch(function() { btn.disabled = false; btn.textContent = '登录'; refreshCaptcha(); });
}

function refreshCaptcha() {
    fetch('/api/v1/captcha').then(function(r) { return r.json(); }).then(function(d) {
        document.getElementById('captcha_id').value = d.data.captcha_id;
        document.getElementById('captcha-img').src = d.data.image;
    });
}
refreshCaptcha();
</script>
{% endblock %}
