{% extends "base.html" %}
{% block title %}重置密码 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-xl shadow-sm p-8">
        <h1 class="text-2xl font-bold text-center mb-6">重置密码</h1>
        <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4"></div>
        <div id="msg-box" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-4"></div>

        <form onsubmit="doReset(); return false;">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="至少6位">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" id="password_confirm" required minlength="6"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="再次输入">
            </div>
            <button type="submit" id="btn" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                重置密码
            </button>
        </form>
    </div>
</div>
<script>
function doReset() {
    var pw = document.getElementById('password').value;
    var pwc = document.getElementById('password_confirm').value;
    var err = document.getElementById('error-box');
    if (pw !== pwc) { err.textContent = '两次密码不一致'; err.classList.remove('hidden'); return; }
    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '提交中...';
    var token = new URLSearchParams(window.location.search).get('token');
    var body = new URLSearchParams();
    body.append('token', token);
    body.append('password', pw);
    fetch('/api/v1/users/reset-password', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.code === 0) {
                document.getElementById('msg-box').textContent = '密码已重置，3秒后跳转登录页...';
                document.getElementById('msg-box').classList.remove('hidden');
                setTimeout(function() { window.location.href = '/login'; }, 3000);
            } else {
                err.textContent = data.message;
                err.classList.remove('hidden');
            }
            btn.disabled = false; btn.textContent = '重置密码';
        });
}
</script>
{% endblock %}
