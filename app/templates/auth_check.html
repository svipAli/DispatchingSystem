<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
<script>
var token = localStorage.getItem('token');
if (token) {
    fetch(location.href, {headers: {'Authorization': 'Bearer ' + token}})
        .then(function(r) {
            if (r.status === 401 || r.status === 302) { localStorage.removeItem('token'); location.href = '/login'; return null; }
            if (r.headers.get('X-Page-Type') === 'auth-check') { localStorage.removeItem('token'); location.href = '/login'; return null; }
            return r.text();
        })
        .then(function(html) {
            if (html) { document.open(); document.write(html); document.close(); }
        });
} else {
    location.href = '/login';
}
</script></body></html>
