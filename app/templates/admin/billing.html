{% extends "base.html" %}
{% block title %}流水记录 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">流水记录</h1>
<div id="billing-list"><div class="text-center text-gray-400 py-12">加载中...</div></div>
<div id="pagination" class="mt-4"></div>
<script>
var currentPage = 1;
function loadBilling(page) {
    page = page || 1; currentPage = page;
    App.get('/api/v1/billing?page=' + page + '&page_size=20').then(function(data) {
        var el = document.getElementById('billing-list');
        if (!data.data || !data.data.items.length) { el.innerHTML = '<div class="text-center text-gray-400 py-12">暂无记录</div>'; document.getElementById('pagination').innerHTML = ''; return; }
        var labels = {recharge: '充值', deduct: '扣费', refund: '退款'};
        var html = '<table class="w-full text-sm bg-white rounded-lg shadow-sm border"><thead class="bg-gray-50"><tr>' +
            '<th class="px-4 py-3 text-left">ID</th><th class="px-4 py-3 text-left">用户</th>' +
            '<th class="px-4 py-3 text-left">类型</th><th class="px-4 py-3 text-left">金额</th>' +
            '<th class="px-4 py-3 text-left">操作前</th><th class="px-4 py-3 text-left">操作后</th>' +
            '<th class="px-4 py-3 text-left">备注</th><th class="px-4 py-3 text-left">时间</th></tr></thead><tbody>';
        data.data.items.forEach(function(r) {
            html += '<tr class="border-t"><td class="px-4 py-3">' + r.id + '</td><td class="px-4 py-3">' + r.user_id + '</td>' +
                '<td class="px-4 py-3"><span class="px-2 py-0.5 text-xs rounded-full ' + (r.type==='recharge'?'bg-green-100 text-green-700':r.type==='refund'?'bg-blue-100 text-blue-700':'bg-red-100 text-red-700') + '">' + (labels[r.type]||r.type) + '</span></td>' +
                '<td class="px-4 py-3 font-medium">¥' + r.amount.toFixed(2) + '</td>' +
                '<td class="px-4 py-3">¥' + r.balance_before.toFixed(2) + '</td><td class="px-4 py-3">¥' + r.balance_after.toFixed(2) + '</td>' +
                '<td class="px-4 py-3 text-xs text-gray-500">' + (r.remark||'') + '</td>' +
                '<td class="px-4 py-3 text-xs text-gray-400">' + new Date(r.created_at).toLocaleString() + '</td></tr>';
        });
        html += '</tbody></table>'; el.innerHTML = html;
        App.pagination(data.data.total, currentPage, data.data.page_size, 'pagination', 'loadBilling');
    });
}
loadBilling(1);
</script>
{% endblock %}
