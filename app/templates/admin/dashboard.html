{% extends "base.html" %}
{% block title %}后台管理 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">管理后台</h1>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-lg shadow-sm p-5">
        <p class="text-xs text-gray-400 mb-1">用户总数</p>
        <p class="text-2xl font-bold text-indigo-600" id="stat-users">-</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-5">
        <p class="text-xs text-gray-400 mb-1">在线节点</p>
        <p class="text-2xl font-bold text-green-600" id="stat-nodes">-</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-5">
        <p class="text-xs text-gray-400 mb-1">今日任务</p>
        <p class="text-2xl font-bold text-blue-600" id="stat-tasks">-</p>
    </div>
    <div class="bg-white rounded-lg shadow-sm p-5">
        <p class="text-xs text-gray-400 mb-1">今日收入</p>
        <p class="text-2xl font-bold text-orange-600" id="stat-revenue">-</p>
    </div>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <a href="/admin/users" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">👥</div>
        <div class="font-semibold text-sm">用户管理</div>
    </a>
    <a href="/admin/nodes" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">🖥️</div>
        <div class="font-semibold text-sm">节点管理</div>
    </a>
    <a href="/admin/services" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">📦</div>
        <div class="font-semibold text-sm">服务管理</div>
    </a>
    <a href="/admin/recharges" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">💰</div>
        <div class="font-semibold text-sm">充值管理</div>
    </a>
    <a href="/admin/billing" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">📊</div>
        <div class="font-semibold text-sm">流水记录</div>
    </a>
    <a href="/admin/config" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">⚙️</div>
        <div class="font-semibold text-sm">系统设置</div>
    </a>
    <a href="/admin/roles" class="bg-white rounded-lg shadow-sm p-4 border hover:shadow-md transition">
        <div class="text-lg mb-1">🔑</div>
        <div class="font-semibold text-sm">角色权限</div>
    </a>
</div>

<script>
App.get('/api/v1/stats').then(function(d) {
    if (d.code === 0) {
        document.getElementById('stat-users').textContent = d.data.total_users;
        document.getElementById('stat-nodes').textContent = d.data.online_nodes;
        document.getElementById('stat-tasks').textContent = d.data.today_tasks;
        document.getElementById('stat-revenue').textContent = '¥' + d.data.today_revenue.toFixed(2);
    }
});
</script>
{% endblock %}
