{% extends "base.html" %}
{% block title %}任务管理 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4"><h1 class="text-2xl font-bold">任务管理</h1></div>
<div class="flex flex-wrap items-center gap-2 mb-4">
    <select id="filter-status" class="px-3 py-2 border rounded-lg text-sm" onchange="loadTasks(1)">
        <option value="">全部状态</option>
        <option value="queued">排队中</option><option value="running">执行中</option>
        <option value="completed">已完成</option><option value="failed">失败</option><option value="cancelled">已取消</option>
    </select>
    <input type="text" id="filter-kw" placeholder="搜索服务类型..." class="px-3 py-2 border rounded-lg text-sm w-48" onkeyup="if(event.key==='Enter')loadTasks(1)">
    <button onclick="loadTasks(1)" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">搜索</button>
</div>
<div id="task-list"><div class="text-center text-gray-400 py-12">加载中...</div></div>
<div id="pagination" class="mt-4"></div>
<script>
var statusMap = {queued:'排队中',running:'执行中',completed:'已完成',failed:'失败',cancelled:'已取消'};
var statusColor = {queued:'bg-yellow-100 text-yellow-700',running:'bg-blue-100 text-blue-700',completed:'bg-green-100 text-green-700',failed:'bg-red-100 text-red-700',cancelled:'bg-gray-100 text-gray-500'};
var currentPage = 1;
var userNames = {};

// 加载用户名映射（非阻塞，失败了也不影响任务加载）
App.get('/api/v1/users?page_size=100').then(function(d) {
    if (d.data && d.data.items) d.data.items.forEach(function(u) { userNames[u.id] = u.username; });
}).catch(function(){});

function loadTasks(page) {
    page = page||1; currentPage=page;
    var p = new URLSearchParams({page:page,page_size:20});
    var st = document.getElementById('filter-status').value, kw = document.getElementById('filter-kw').value.trim();
    if (st) p.set('status',st); if (kw) p.set('keyword',kw);
    App.get('/api/v1/tasks/admin?'+p.toString()).then(function(d){
        var el = document.getElementById('task-list');
        if (!d.data||!d.data.items.length){ el.innerHTML='<div class="text-center text-gray-400 py-12">暂无任务</div>'; document.getElementById('pagination').innerHTML=''; return; }
        var html = '<table class="w-full text-sm bg-white rounded-lg shadow-sm border"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">ID</th><th class="px-4 py-3 text-left">用户</th><th class="px-4 py-3 text-left">服务</th><th class="px-4 py-3 text-left">状态</th><th class="px-4 py-3 text-left">节点</th><th class="px-4 py-3 text-left">费用</th><th class="px-4 py-3 text-left">时间</th></tr></thead><tbody>';
        d.data.items.forEach(function(t){
            html += '<tr class="border-t"><td class="px-4 py-3">'+t.id+'</td><td class="px-4 py-3">'+(userNames[t.user_id]||('用户'+t.user_id))+'</td>'+
                '<td class="px-4 py-3 text-xs">'+t.service_type+'</td>'+
                '<td class="px-4 py-3"><span class="px-2 py-0.5 text-xs rounded-full '+(statusColor[t.status]||'')+'">'+(statusMap[t.status]||t.status)+'</span></td>'+
                '<td class="px-4 py-3 text-xs">'+(t.node_id||'--')+'</td>'+
                '<td class="px-4 py-3">¥'+t.cost.toFixed(2)+'</td>'+
                '<td class="px-4 py-3 text-xs text-gray-400">'+new Date(t.created_at).toLocaleString()+'</td></tr>';
        });
        html += '</tbody></table>'; el.innerHTML = html;
        App.pagination(d.data.total, currentPage, d.data.page_size, 'pagination', 'loadTasks');
    });
}
loadTasks(1);
</script>
{% endblock %}
