{% extends "base.html" %}
{% block title %}文件管理 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">文件管理</h1>
</div>
<div id="file-list"><div class="text-center text-gray-400 py-12">加载中...</div></div>
<div id="pagination" class="mt-4"></div>

<script>
var currentPage = 1;

function loadFiles(page) {
    page = page || 1; currentPage = page;
    App.get('/api/v1/files/admin?page=' + page + '&page_size=20').then(function(data) {
        var el = document.getElementById('file-list');
        if (!data.data || !data.data.items.length) { el.innerHTML = '<div class="text-center text-gray-400 py-12">暂无文件</div>'; return; }
        var html = '<table class="w-full text-sm bg-white rounded-lg shadow-sm border"><thead class="bg-gray-50"><tr>' +
            '<th class="px-4 py-3 text-left">文件名</th><th class="px-4 py-3 text-left">大小</th>' +
            '<th class="px-4 py-3 text-left">类型</th><th class="px-4 py-3 text-left">存储</th>' +
            '<th class="px-4 py-3 text-left">上传者</th><th class="px-4 py-3 text-left">时间</th></tr></thead><tbody>';
        data.data.items.forEach(function(f) {
            var size = f.file_size < 1024 ? f.file_size + 'B' : f.file_size < 1048576 ? (f.file_size/1024).toFixed(1) + 'KB' : (f.file_size/1048576).toFixed(1) + 'MB';
            html += '<tr class="border-t">' +
                '<td class="px-4 py-3"><a href="' + f.file_path + '" target="_blank" class="text-indigo-600 hover:underline">' + (f.original_name || f.file_path) + '</a></td>' +
                '<td class="px-4 py-3 text-gray-500">' + size + '</td>' +
                '<td class="px-4 py-3 text-gray-500">' + (f.mime_type || '-') + '</td>' +
                '<td class="px-4 py-3">' + (f.storage_type === 'tencent_cos' ? '<span class="text-blue-500">COS</span>' : '<span class="text-gray-400">本地</span>') + '</td>' +
                '<td class="px-4 py-3 text-gray-500">用户' + f.user_id + '</td>' +
                '<td class="px-4 py-3 text-gray-400 text-xs">' + new Date(f.created_at).toLocaleString() + '</td>' +
                '</tr>';
        });
        html += '</tbody></table>'; el.innerHTML = html;
        var tp = Math.ceil(data.data.total / data.data.page_size);
        var pg = '<div class="flex items-center space-x-1 text-sm"><span class="text-gray-500 mr-2">共 ' + data.data.total + ' 条</span>';
        for (var i = 1; i <= tp; i++) pg += '<button onclick="loadFiles(' + i + ')" class="px-3 py-1 rounded ' + (i===page?'bg-indigo-600 text-white':'bg-gray-200') + '">' + i + '</button>';
        pg += '</div>';
        document.getElementById('pagination').innerHTML = pg;
    });
}

loadFiles();
</script>
{% endblock %}
