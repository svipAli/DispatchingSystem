{% extends "base.html" %}
{% block title %}角色权限 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">角色权限管理</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div><h2 class="text-lg font-semibold mb-4">角色列表</h2><div id="role-list"><div class="text-gray-400 text-sm">加载中...</div></div></div>
    <div><h2 class="text-lg font-semibold mb-4">权限列表</h2><div id="perm-list"><div class="text-gray-400 text-sm">加载中...</div></div></div>
</div>
<script>
App.get('/api/v1/roles').then(function(data) {
    var el = document.getElementById('role-list');
    if (!data.data || !data.data.items.length) { el.innerHTML = '<div class="text-gray-400 text-sm">暂无角色</div>'; return; }
    var html = '';
    data.data.items.forEach(function(r) {
        html += '<div class="bg-white rounded-lg shadow-sm p-3 border text-sm flex justify-between mb-2">' +
            '<div><span class="font-medium">' + r.name + '</span> <span class="text-gray-400">' + r.code + '</span></div>' +
            '<span class="text-xs text-gray-400">' + (r.is_system ? '系统内置' : '自定义') + '</span></div>';
    });
    el.innerHTML = html;
});
App.get('/api/v1/permissions').then(function(data) {
    var el = document.getElementById('perm-list');
    if (!data.data || !data.data.items.length) { el.innerHTML = '<div class="text-gray-400 text-sm">暂无权限</div>'; return; }
    var html = '';
    data.data.items.forEach(function(p) {
        html += '<div class="bg-white rounded-lg shadow-sm p-3 border text-sm flex justify-between mb-2">' +
            '<div><span class="font-medium">' + p.name + '</span> <code class="text-xs text-indigo-600">' + p.code + '</code></div>' +
            '<span class="text-xs text-gray-400">' + p.module + '</span></div>';
    });
    el.innerHTML = html;
});
</script>
{% endblock %}
