{% extends "base.html" %}
{% block title %}系统设置 - {{ settings.APP_NAME }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">系统设置</h1>

<form onsubmit="saveSettings(); return false;">
    <!-- 站点设置 -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">站点设置</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">站点标题</label>
                <input id="site_title" class="w-full px-3 py-2 border rounded-lg" placeholder="DispatchingSystem">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">站点 Logo</label>
                <div class="flex gap-2">
                    <input id="site_logo" class="flex-1 px-3 py-2 border rounded-lg" placeholder="URL 或点击上传" oninput="previewLogo()">
                    <label class="px-3 py-2 bg-gray-100 border rounded-lg cursor-pointer hover:bg-gray-200 text-sm text-gray-600 whitespace-nowrap">
                        上传<input type="file" accept="image/*" style="display:none" onchange="uploadLogo(this)">
                    </label>
                </div>
                <div class="mt-2"><img id="logo-preview" class="h-10 rounded border" style="display:none" src=""></div>
            </div>
        </div>
        <div class="mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">联系客服说明（富文本，支持 HTML）</label>
            <div id="contact-editor" style="height:150px"></div>
        </div>
    </div>

    <!-- 邮件设置 -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">邮件服务（SMTP）</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SMTP 服务器</label>
                <input id="smtp_host" class="w-full px-3 py-2 border rounded-lg" placeholder="smtp.qq.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SMTP 端口</label>
                <input id="smtp_port" class="w-full px-3 py-2 border rounded-lg" placeholder="465">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">发件邮箱</label>
                <input id="smtp_user" class="w-full px-3 py-2 border rounded-lg" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱授权码</label>
                <input id="smtp_password" type="password" class="w-full px-3 py-2 border rounded-lg" placeholder="授权码，非邮箱密码">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">发件人名称</label>
                <input id="smtp_from_name" class="w-full px-3 py-2 border rounded-lg" placeholder="DispatchingSystem">
            </div>
        </div>
    </div>

    <!-- 存储设置 -->
    <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">文件存储（腾讯云 COS）</h2>
        <p class="text-xs text-gray-400 mb-4">不填则使用本地上传</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SecretId</label>
                <input id="cos_secret_id" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SecretKey</label>
                <input id="cos_secret_key" type="password" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Bucket 名称</label>
                <input id="cos_bucket" class="w-full px-3 py-2 border rounded-lg" placeholder="my-bucket-1250000000">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">地域（Region）</label>
                <input id="cos_region" class="w-full px-3 py-2 border rounded-lg" placeholder="ap-guangzhou">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">自定义访问域名（选填）</label>
                <input id="cos_cdn_domain" class="w-full px-3 py-2 border rounded-lg" placeholder="https://static.yourdomain.com">
            </div>
        </div>
    </div>

    <!-- AI 助手设置 -->
    <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">AI 管理助手</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">API 地址</label>
                <input id="ai_api_url" class="w-full px-3 py-2 border rounded-lg" placeholder="https://api.deepseek.com/v1">
                <p class="text-xs text-gray-400 mt-1">OpenAI 兼容接口地址，以 /v1 结尾</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                <input id="ai_api_key" type="password" class="w-full px-3 py-2 border rounded-lg" placeholder="sk-xxxxxxxx">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">模型</label>
                <div class="flex space-x-2">
                    <select id="ai_model" class="flex-1 px-3 py-2 border rounded-lg">
                        <option value="">请先获取模型列表</option>
                    </select>
                    <button type="button" onclick="fetchModels()" class="bg-gray-100 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-200 whitespace-nowrap">获取模型</button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-end">
        <button type="submit" id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">
            保存全部设置
        </button>
    </div>
</form>

<div id="save-result" class="mt-4"></div>

<script>
function uploadLogo(input) {
    var file = input.files[0];
    if (!file) return;
    App.upload(file, function(url) {
        document.getElementById('site_logo').value = url;
        previewLogo();
    });
}
function previewLogo() {
    var url = document.getElementById('site_logo').value;
    var img = document.getElementById('logo-preview');
    if (url) { img.src = url; img.style.display = 'block'; }
    else { img.style.display = 'none'; }
}

// 字段名到 input id 的映射
var fieldMap = {
    'site_title': 'site_title', 'site_logo': 'site_logo',
    'smtp_host': 'smtp_host', 'smtp_port': 'smtp_port', 'smtp_user': 'smtp_user',
    'smtp_password': 'smtp_password', 'smtp_from_name': 'smtp_from_name',
    'cos_secret_id': 'cos_secret_id', 'cos_secret_key': 'cos_secret_key',
    'cos_bucket': 'cos_bucket', 'cos_region': 'cos_region', 'cos_cdn_domain': 'cos_cdn_domain',
    'ai_api_url': 'ai_api_url', 'ai_api_key': 'ai_api_key', 'ai_model': 'ai_model'
};

var contactQuill = null;

// 初始化 Quill
setTimeout(function() {
    contactQuill = new Quill('#contact-editor', { theme: 'snow', placeholder: '客服联系方式...' });
}, 200);

// 加载已有配置预填表单
App.get('/api/v1/system-configs?page_size=100').then(function(data) {
    if (data.data && data.data.items) {
        data.data.items.forEach(function(c) {
            var inputId = fieldMap[c.key];
            if (inputId) {
                var el = document.getElementById(inputId);
                if (el) el.value = c.value;
            }
            if (c.key === 'contact_service' && contactQuill) {
                contactQuill.root.innerHTML = c.value || '';
            }
        });
        previewLogo();
    }
});

function saveSettings() {
    var btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = '保存中...';
    var promises = [];
    for (var key in fieldMap) {
        var value = document.getElementById(fieldMap[key]).value;
        var group = key.startsWith('smtp_') ? 'email' : key.startsWith('cos_') ? 'storage' : key.startsWith('ai_') ? 'ai' : 'site';
        promises.push(App.post('/api/v1/system-configs/upsert', {key: key, value: value, group: group}));
    }
    // 保存 Quill 富文本
    if (contactQuill) {
        var cs = contactQuill.root.innerHTML.trim();
        if (cs && cs !== '<p><br></p>') {
            promises.push(App.post('/api/v1/system-configs/upsert', {key: 'contact_service', value: cs, group: 'site'}));
        }
    }
    Promise.all(promises).then(function() {
        document.getElementById('save-result').innerHTML = '<div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3">全部设置已保存</div>';
    }).catch(function() {
        document.getElementById('save-result').innerHTML = '<div class="text-red-500 text-sm">保存失败</div>';
    }).finally(function() {
        btn.disabled = false; btn.textContent = '保存全部设置';
    });
}

async function fetchModels() {
    var url = document.getElementById('ai_api_url').value.trim();
    var key = document.getElementById('ai_api_key').value.trim();
    if (!url || !key) { alert('请先填写 API 地址和 Key'); return; }
    var btn = document.querySelector('#ai_model + button');
    btn.disabled = true; btn.textContent = '获取中...';
    try {
        var resp = await fetch(url.replace(/\/+$/, '') + '/models', {
            headers: { 'Authorization': 'Bearer ' + key }
        });
        var data = await resp.json();
        var sel = document.getElementById('ai_model');
        sel.innerHTML = '';
        if (data.data && data.data.length) {
            data.data.forEach(function(m) {
                if (m.id && !m.id.includes('embedding') && !m.id.includes('moderation')) {
                    var opt = document.createElement('option');
                    opt.value = m.id; opt.textContent = m.id;
                    var current = sel.value || document.getElementById('ai_model').dataset.saved;
                    if (current === m.id) opt.selected = true;
                    sel.appendChild(opt);
                }
            });
        }
    } catch(e) { alert('获取失败: ' + e.message); }
    btn.disabled = false; btn.textContent = '获取模型';
}

// 页面加载时记录已保存的模型
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        var el = document.getElementById('ai_model');
        if (el.value) el.dataset.saved = el.value;
    }, 500);
});
</script>
{% endblock %}
